[project]
name = "uv-update-check"
version = "0.1.0"
description = "Check for dependency updates in pyproject.toml, like ncu for uv projects"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "tomlkit>=0.12",
    "packaging>=24",
    "httpx>=0.27",
    "rich>=13",
    "typer>=0.12",
    "anyio>=4",
]

[project.scripts]
uuc = "uv_update_check.cli:app"

[dependency-groups]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.24",
    "respx>=0.22",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/uv_update_check"]
